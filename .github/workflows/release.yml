name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release, for example v0.1.1"
        required: true
        type: string
      dry_run_foundry:
        description: "Validate the Foundry package API request without saving"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub and Foundry release
    runs-on: ubuntu-latest

    env:
      PACKAGE_ZIP: sheetshare-mobile.zip
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Check out tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate release tag and manifest
        run: |
          node <<'NODE'
          const fs = require("fs");
          const tag = process.env.RELEASE_TAG;
          const manifest = JSON.parse(fs.readFileSync("module.json", "utf8"));
          const version = tag.replace(/^v/, "");

          if (!/^v\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?$/.test(tag)) {
            throw new Error(`Release tag must look like vX.Y.Z. Got: ${tag}`);
          }

          if (manifest.version !== version) {
            throw new Error(`module.json version (${manifest.version}) must match tag (${version}).`);
          }

          if (manifest.id !== "sheetshare-mobile") {
            throw new Error(`Unexpected package id: ${manifest.id}`);
          }

          if (!manifest.compatibility?.minimum || !manifest.compatibility?.verified) {
            throw new Error("module.json must include compatibility.minimum and compatibility.verified.");
          }
          NODE

      - name: Build release assets
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist/package
          git archive --format=tar HEAD | tar -x -C dist/package
          rm -rf dist/package/.github dist/package/dist

          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const tag = process.env.RELEASE_TAG;
          const repo = process.env.GITHUB_REPOSITORY;
          const packageDir = path.join("dist", "package");
          const manifestPath = path.join(packageDir, "module.json");
          const manifest = JSON.parse(fs.readFileSync(manifestPath, "utf8"));

          manifest.url = `https://github.com/${repo}`;
          manifest.manifest = `https://github.com/${repo}/releases/latest/download/module.json`;
          manifest.download = `https://github.com/${repo}/releases/download/${tag}/${process.env.PACKAGE_ZIP}`;

          const formatted = `${JSON.stringify(manifest, null, 2)}\n`;
          fs.writeFileSync(manifestPath, formatted);
          fs.writeFileSync(path.join("dist", "module.json"), formatted);
          NODE

          (cd dist/package && zip -qr "../${PACKAGE_ZIP}" .)

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: SheetShare Mobile ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            dist/module.json
            dist/${{ env.PACKAGE_ZIP }}

      - name: Publish release to Foundry package registry
        env:
          FOUNDRY_PACKAGE_TOKEN: ${{ secrets.FOUNDRY_PACKAGE_TOKEN }}
          DRY_RUN_FOUNDRY: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run_foundry || false }}
        run: |
          node <<'NODE'
          const fs = require("fs");

          async function main() {
            const token = process.env.FOUNDRY_PACKAGE_TOKEN;
            if (!token) {
              throw new Error("Missing GitHub Actions secret: FOUNDRY_PACKAGE_TOKEN");
            }

            const tag = process.env.RELEASE_TAG;
            const repo = process.env.GITHUB_REPOSITORY;
            const manifest = JSON.parse(fs.readFileSync("dist/module.json", "utf8"));
            const dryRun = process.env.DRY_RUN_FOUNDRY === "true";

            const body = {
              id: manifest.id,
              release: {
                version: manifest.version,
                manifest: `https://github.com/${repo}/releases/download/${tag}/module.json`,
                notes: `https://github.com/${repo}/releases/tag/${tag}`,
                compatibility: {
                  minimum: manifest.compatibility.minimum,
                  verified: manifest.compatibility.verified,
                  maximum: manifest.compatibility.maximum || ""
                }
              }
            };

            if (dryRun) body["dry-run"] = true;

            const response = await fetch("https://foundryvtt.com/_api/packages/release_version/", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "Authorization": token
              },
              body: JSON.stringify(body)
            });

            const text = await response.text();
            let data;
            try {
              data = JSON.parse(text);
            } catch {
              data = { raw: text };
            }

            if (!response.ok || data.status !== "success") {
              throw new Error(`Foundry release API failed (${response.status}): ${JSON.stringify(data)}`);
            }

            console.log(dryRun ? "Foundry release dry run succeeded." : "Foundry package release published.");
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
